# ICRA 挑战赛 PPO 训练主配置（基于 RLinf 框架）
# 使用方式：
#   cd examples/icra_challenge
#   python rlinf/train.py \
#       ++actor.model.model_path=/path/to/checkpoint \
#       ++env.train.task_name=sorting_packages
#
# 切换任务：
#   ++env.train.task_name=pouring_workpiece
#   ++env.train.task_name=opening_door

defaults:
  - env/icra_challenge@env.train
  - env/icra_challenge@env.eval
  - model/acot_vla@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:ICRA_RLINF_CFG_PATH,examples/icra_challenge/rlinf/config}/

# ── 集群配置（单机） ─────────────────────────────────────────────────────────
cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

# ── Runner 配置 ──────────────────────────────────────────────────────────────
runner:
  task_type: embodied
  logger:
    log_path: "../results/icra_rlinf"
    project_name: rlinf
    experiment_name: "icra_challenge_ppo_acot_vla"
    logger_backends: ["tensorboard"]   # 可改为 ["wandb"] 或 ["swanlab"]

  max_epochs: 500
  max_steps: -1

  only_eval: False
  val_check_interval: 50            # 每 50 epoch 评估一次
  save_interval: 50

  resume_dir: null
  ckpt_path: null

# ── PPO 算法超参数 ───────────────────────────────────────────────────────────
algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 8
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 4
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.01                     # KL 散度惩罚系数，防止偏离预训练策略
  entropy_bonus: 0.001
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.05
  rewards_upper_bound: 0.95

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

# ── 环境配置 ─────────────────────────────────────────────────────────────────
env:
  group_name: "EnvGroup"

  train:
    task_name: sorting_packages     # 默认任务，运行时可覆盖
    task_suite_name: libero_spatial
    total_num_envs: 32
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240

  eval:
    task_name: sorting_packages
    task_suite_name: libero_spatial
    total_num_envs: 50
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

# ── Rollout 工作进程配置 ─────────────────────────────────────────────────────
rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_spatial         # 动作反归一化 key
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

# ── Actor（训练节点）配置 ────────────────────────────────────────────────────
actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 512
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/acot_vla_checkpoint"  # 运行时覆盖
    num_action_chunks: 10
    action_dim: 7
    add_value_head: True
    openpi:
      detach_critic_input: True

  optim:
    lr: 2.0e-6                        # 比 LIBERO 基准更保守，因为 ACoT-VLA 更大
    value_lr: 5.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False     # openpi 不支持梯度检查点
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
